name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf automake build-essential libssl-dev libffi-dev python3-dev libtiff5-dev libjpeg8-dev libopenjp2-7-dev zlib1g-dev libfreetype6-dev liblcms2-dev libwebp-dev libharfbuzz-dev libfribidi-dev libxcb1-dev libsndfile1-dev cmake pkg-config autoconf-archive libtool-bin

      - name: Build APK with Buildozer
        run: |
          pip install --upgrade pip
          # 使用稳定版本的 Buildozer 和 Cython，避免兼容性问题
          pip install buildozer==1.5.0 cython==0.29.33
          buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-todo-apk
          path: bin/*.apk
