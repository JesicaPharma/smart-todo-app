name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      # 让 buildozer / p4a 走更稳定的组合
      P4A_BRANCH: stable
      # 建议与你 buildozer.spec 里保持一致
      ANDROIDAPI: "30"
      ANDROIDMINAPI: "21"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      # 强制 Java 11（不要用 17；buildozer/p4a/旧 AGP 组合更稳）
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      # 强制 Gradle 7.6（避免 runner 自带 Gradle 9.x 引发不兼容）
      - name: Install Gradle 7.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip
          unzip -q gradle-7.6-bin.zip
          sudo mv gradle-7.6 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH
          gradle -v

      # 系统依赖（尽量精简，但保证 p4a 常见配方可编译）
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            build-essential \
            autoconf automake libtool libtool-bin autoconf-archive \
            pkg-config cmake \
            libssl-dev libffi-dev python3-dev \
            zlib1g-dev \
            libjpeg-dev libpng-dev \
            libfreetype6-dev \
            libsndfile1-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      # 缓存 buildozer 下载的 SDK/NDK/构建产物（大幅提速 + 更稳定）
      - name: Cache buildozer directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install Buildozer (pinned)
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install buildozer==1.5.0 cython==0.29.33

      # 可选：把 log_level 提升到 2，失败时更好定位
      - name: Build APK
        run: |
          # 如果你愿意，也可以在 buildozer.spec 里设置 log_level = 2
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-todo-apk
          path: bin/*.apk
